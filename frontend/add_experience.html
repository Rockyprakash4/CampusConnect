<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusConnect - Share Placement Experience</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Custom Style -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body style="padding-top: 72px;">

  <div id="cc-navbar-container"></div>

  <main class="container py-5 animate-fade-in">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        
        <div class="glass-card p-5">
          <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
            <div>
              <h2 class="fw-bold mb-1">Share Interview Experience</h2>
              <p class="text-muted small mb-0">Your journey will help upcoming students prepare better!</p>
            </div>
            <a href="/dashboard.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-x-circle me-1"></i> Cancel</a>
          </div>

          <form id="experience-form" onsubmit="handleFormSubmit(event)">
            
            <!-- SECTION 1: Basic details -->
            <div class="mb-5">
              <h5 class="fw-bold mb-3 text-gradient"><i class="bi bi-info-circle me-2"></i>1. Job & Company Details</h5>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="exp-company" class="form-label small fw-semibold">Company Name *</label>
                  <input type="text" id="exp-company" class="form-control" placeholder="e.g. Microsoft" required>
                </div>
                <div class="col-md-6">
                  <label for="exp-role" class="form-label small fw-semibold">Job Role *</label>
                  <input type="text" id="exp-role" class="form-control" placeholder="e.g. Software Engineer" required>
                </div>
                <div class="col-md-4">
                  <label for="exp-ctc" class="form-label small fw-semibold">CTC in LPA *</label>
                  <input type="number" step="0.01" id="exp-ctc" class="form-control" placeholder="e.g. 14.50" required>
                </div>
                <div class="col-md-4">
                  <label for="exp-type" class="form-label small fw-semibold">Job Type *</label>
                  <select id="exp-type" class="form-select" required>
                    <option value="Full-Time">Full-Time</option>
                    <option value="Internship">Internship</option>
                    <option value="Internship + Full-Time">Internship + Full-Time</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label for="exp-hiring" class="form-label small fw-semibold">Hiring Channel *</label>
                  <select id="exp-hiring" class="form-select" required>
                    <option value="On Campus">On Campus</option>
                    <option value="Off Campus">Off Campus</option>
                    <option value="Pool Campus">Pool Campus</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label for="exp-difficulty" class="form-label small fw-semibold">Difficulty Level *</label>
                  <select id="exp-difficulty" class="form-select" required>
                    <option value="Easy">Easy</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="Hard">Hard</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label for="exp-result" class="form-label small fw-semibold">Final Result *</label>
                  <select id="exp-result" class="form-select" required>
                    <option value="Selected">Selected</option>
                    <option value="Rejected">Rejected</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label for="exp-rounds" class="form-label small fw-semibold">Total Interview Rounds *</label>
                  <input type="number" id="exp-rounds" class="form-control" value="3" min="1" required>
                </div>
                <div class="col-md-6">
                  <label for="exp-location" class="form-label small fw-semibold">Location (Optional)</label>
                  <input type="text" id="exp-location" class="form-control" placeholder="e.g. Bangalore, Remote">
                </div>
                <div class="col-md-6">
                  <label for="exp-date" class="form-label small fw-semibold">Campus Drive Date</label>
                  <input type="date" id="exp-date" class="form-control">
                </div>
                <div class="col-md-12">
                  <label for="exp-eligibility" class="form-label small fw-semibold">Eligibility Criteria (Optional)</label>
                  <input type="text" id="exp-eligibility" class="form-control" placeholder="e.g. MCA/BTech, CGPA >= 7.5, no active backlogs">
                </div>
              </div>
            </div>

            <!-- SECTION 2: Process details -->
            <div class="mb-5">
              <h5 class="fw-bold mb-3 text-gradient"><i class="bi bi-chat-left-quote me-2"></i>2. Recruitment Process Details</h5>
              <div class="row g-3">
                <div class="col-12">
                  <label for="exp-details" class="form-label small fw-semibold">Overall Process Details *</label>
                  <textarea id="exp-details" class="form-control" rows="5" placeholder="Provide a detailed chronological walkthrough of the selection process..." required></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-coding" class="form-label small fw-semibold">Coding Round Experience (Optional)</label>
                  <textarea id="exp-coding" class="form-control" rows="3" placeholder="Platforms used, number of questions, testcases complexity, topics asked..."></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-tech" class="form-label small fw-semibold">Technical Interview Questions Asked (Optional)</label>
                  <textarea id="exp-tech" class="form-control" rows="4" placeholder="Detail any core concepts, algorithms, code snippets discussed..."></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-sql" class="form-label small fw-semibold">SQL & Database Questions (Optional)</label>
                  <textarea id="exp-sql" class="form-control" rows="3" placeholder="Database queries, joins, indices, normalization models..."></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-sys" class="form-label small fw-semibold">System Design Questions (Optional)</label>
                  <textarea id="exp-sys" class="form-control" rows="3" placeholder="System architectures, API limits, microservices details..."></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-hr" class="form-label small fw-semibold">HR Interview Questions (Optional)</label>
                  <textarea id="exp-hr" class="form-control" rows="3" placeholder="Self introduction, hobbies, relocation, why this company, etc..."></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-behavioral" class="form-label small fw-semibold">Behavioral Questions (Optional)</label>
                  <textarea id="exp-behavioral" class="form-control" rows="3" placeholder="Team conflicts, deadlines, work pressure scenarios..."></textarea>
                </div>
              </div>
            </div>

            <!-- SECTION 3: Preparation & Tips -->
            <div class="mb-5">
              <h5 class="fw-bold mb-3 text-gradient"><i class="bi bi-journal-bookmark me-2"></i>3. Prep & Advice</h5>
              <div class="row g-3">
                <div class="col-12">
                  <label for="exp-strategy" class="form-label small fw-semibold">Preparation Strategy (Optional)</label>
                  <textarea id="exp-strategy" class="form-control" rows="3" placeholder="How did you study? What was your approach?"></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-timeline" class="form-label small fw-semibold">Preparation Timeline (Optional)</label>
                  <textarea id="exp-timeline" class="form-control" rows="2" placeholder="e.g. Started DSA 6 months before, revised databases in the last week."></textarea>
                </div>
                <div class="col-md-6">
                  <label for="exp-solved" class="form-label small fw-semibold">LeetCode Problems Solved (Optional)</label>
                  <input type="text" id="exp-solved" class="form-control" placeholder="e.g. 300+ problems, mainly Medium level">
                </div>
                <div class="col-md-6">
                  <label for="exp-projects" class="form-label small fw-semibold">Projects Asked In Interview (Optional)</label>
                  <input type="text" id="exp-projects" class="form-control" placeholder="e.g. E-Commerce app, Cloud storage system">
                </div>
                <div class="col-12">
                  <label for="exp-resources" class="form-label small fw-semibold">Resources & Links Used (Optional)</label>
                  <textarea id="exp-resources" class="form-control" rows="2" placeholder="Courses, books, channels, websites used..."></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-resume" class="form-label small fw-semibold">Resume & Portfolio Tips (Optional)</label>
                  <textarea id="exp-resume" class="form-control" rows="2" placeholder="Projects formatting, layouts, keywords that got you shortlisted..."></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-mistakes" class="form-label small fw-semibold">Mistakes Made (Optional)</label>
                  <textarea id="exp-mistakes" class="form-control" rows="2" placeholder="What mistakes did you make? How can juniors avoid them?"></textarea>
                </div>
                <div class="col-12">
                  <label for="exp-tips" class="form-label small fw-semibold">Tips for Juniors & Final Suggestions *</label>
                  <textarea id="exp-tips" class="form-control" rows="3" placeholder="Your key recommendation or closing checklist..." required></textarea>
                </div>
              </div>
            </div>

            <!-- SECTION 4: Attachments and Tags -->
            <div class="mb-4">
              <h5 class="fw-bold mb-3 text-gradient"><i class="bi bi-paperclip me-2"></i>4. File Attachments & Tags</h5>
              <div class="row g-3">
                <div class="col-md-6">
                  <label for="exp-file" class="form-label small fw-semibold">Attachment (PDF/Image only, Max 5MB)</label>
                  <input type="file" id="exp-file" class="form-control" accept=".pdf,image/*">
                </div>
                <div class="col-md-6">
                  <label for="exp-tags" class="form-label small fw-semibold">Tags (Comma separated)</label>
                  <input type="text" id="exp-tags" class="form-control" placeholder="e.g. Google, SWE, Graph, Java">
                </div>
              </div>
            </div>

            <button type="submit" class="btn btn-premium w-100 btn-lg mt-4"><i class="bi bi-check2-circle me-2"></i> Publish Experience</button>
          </form>

        </div>

      </div>
    </div>
  </main>

  <div id="cc-footer-container"></div>

  <!-- BootStrap & Custom JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!isLoggedIn()) {
        window.location.href = "/login.html";
        return;
      }
      
      const role = getRole();
      if (role !== "placed student" && role !== "admin") {
        showToast("Only placed students can share placement experiences.", "warning");
        setTimeout(() => { window.location.href = "/dashboard.html"; }, 1500);
      }
    });

    async function handleFormSubmit(e) {
      e.preventDefault();
      
      // Basic payload assembly
      const body = {
        company_name: document.getElementById("exp-company").value,
        job_role: document.getElementById("exp-role").value,
        ctc: parseFloat(document.getElementById("exp-ctc").value),
        job_type: document.getElementById("exp-type").value,
        hiring_type: document.getElementById("exp-hiring").value,
        difficulty: document.getElementById("exp-difficulty").value,
        result: document.getElementById("exp-result").value,
        rounds_count: parseInt(document.getElementById("exp-rounds").value),
        location: document.getElementById("exp-location").value,
        drive_date: document.getElementById("exp-date").value || null,
        eligibility_criteria: document.getElementById("exp-eligibility").value,
        
        experience_details: document.getElementById("exp-details").value,
        coding_round_exp: document.getElementById("exp-coding").value,
        tech_questions: document.getElementById("exp-tech").value,
        sql_questions: document.getElementById("exp-sql").value,
        system_design_questions: document.getElementById("exp-sys").value,
        hr_questions: document.getElementById("exp-hr").value,
        behavioral_questions: document.getElementById("exp-behavioral").value,
        
        prep_strategy: document.getElementById("exp-strategy").value,
        prep_timeline: document.getElementById("exp-timeline").value,
        leetcode_solved: document.getElementById("exp-solved").value,
        projects_asked: document.getElementById("exp-projects").value,
        resources_used: document.getElementById("exp-resources").value,
        resume_tips: document.getElementById("exp-resume").value,
        mistakes: document.getElementById("exp-mistakes").value,
        tips: document.getElementById("exp-tips").value,
        
        tags: document.getElementById("exp-tags").value
      };
      
      try {
        const createdExp = await apiCall("/experiences/", {
          method: "POST",
          body
        });
        
        // Handle file upload if present
        const fileInput = document.getElementById("exp-file");
        if (fileInput.files.length > 0) {
          const fileFormData = new FormData();
          fileFormData.append("file", fileInput.files[0]);
          
          await apiCall(`/experiences/${createdExp.id}/attachment`, {
            method: "POST",
            body: fileFormData
          });
        }
        
        showToast("Placement Experience shared! Pending Admin Approval.", "success");
        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 1500);
      } catch (err) {
        showToast(err.message, "danger");
      }
    }
  </script>
</body>
</html>
